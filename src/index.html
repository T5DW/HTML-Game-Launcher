<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wyatt's Games</title>

<link rel="stylesheet" href="style.css">

<style>
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.popup {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 12px;
    width: 340px;
    text-align: center;
    border: 1px solid #333;
}

.popup h2 {
    color: #4fc3f7;
    margin-bottom: 10px;
}

.popup p {
    color: #aaa;
    font-size: 14px;
}

.popup button {
    margin-top: 15px;
    padding: 8px 12px;
    border: none;
    background: #4fc3f7;
    font-weight: bold;
    cursor: pointer;
    border-radius: 6px;
}
</style>
</head>

<body>

<div class="overlay" id="patchOverlay">
    <div class="popup">
        <h2>Patch Notes v2.0</h2>
        <p>Added Flappy Circle</p>
        <p>Updated launcher layout</p>
        <p>Improved Tennis AI system</p>
        <p>Added difficulty balancing</p>
        <p>Added replay system</p>
        <p>Added launcher popup patch notes</p>
        <button onclick="closePatch()">Continue</button>
    </div>
</div>

<div class="container">
    <h1 class="title">Wyatt's Games</h1>

    <div class="games-grid" id="gamesGrid"></div>
</div>

<script src="games.js"></script>

<script>
function closePatch() {
    document.getElementById("patchOverlay").style.display = "none";
}
</script>

</body>
</html>
