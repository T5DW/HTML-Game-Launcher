<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Top Down Tennis</title>

<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: Arial;
    color: white;
}

canvas {
    display: block;
    margin: auto;
    background: #0b0b0b;
}

.hud {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
}

.menu {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #1c1c1c;
    padding: 10px;
    border-radius: 8px;
}

.centerText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    font-size: 20px;
}
</style>
</head>

<body>

<div class="hud" id="hud">Player 0 - AI 0</div>

<div class="menu">
<label>AI Difficulty:</label>
<select id="difficulty">
<option value="easy">Easy</option>
<option value="normal" selected>Normal</option>
<option value="hard">Hard</option>
<option value="extreme">Extreme</option>
</select>
</div>

<div class="centerText" id="centerText"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 900;
canvas.height = 500;

const difficultySettings = {
easy: { ballSpeed: 2.2, aiSpeed: 2.2, aiMissChance: 0.25, aiFreeze: 60 },
normal: { ballSpeed: 2.8, aiSpeed: 3.2, aiMissChance: 0.15, aiFreeze: 45 },
hard: { ballSpeed: 3.4, aiSpeed: 4.2, aiMissChance: 0.07, aiFreeze: 30 },
extreme: { ballSpeed: 4.2, aiSpeed: 5.2, aiMissChance: 0.03, aiFreeze: 20 }
};

let difficulty = "normal";

const player = { x: 30, y: 200, w: 10, h: 80, score: 0 };
const ai = { x: 860, y: 200, w: 10, h: 80, score: 0 };

const ball = { x: 450, y: 250, r: 8, vx: 0, vy: 0 };

let keys = {};
let gameOver = false;

let aiTargetY = 250;
let aiFreeze = 0;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

document.getElementById("difficulty").addEventListener("change", e => {
difficulty = e.target.value;
resetPositions();
});

function resetPositions() {
player.x = 30;
player.y = 200;
ai.x = 860;
ai.y = 200;
ball.x = 450;
ball.y = 250;
ball.vx = 0;
ball.vy = 0;

setTimeout(() => {
serveBall();
}, 500);
}

function serveBall() {
const set = difficultySettings[difficulty];
let dir = Math.random() < 0.5 ? -1 : 1;
ball.vx = set.ballSpeed * dir;
ball.vy = (Math.random() * 2 - 1);
}

function predictBallY() {
let tempX = ball.x;
let tempY = ball.y;
let vx = ball.vx;
let vy = ball.vy;

while (vx > 0 && tempX < ai.x) {
tempX += vx;
tempY += vy;

if (tempY <= 0 || tempY >= canvas.height) {
vy *= -1;
}
}

return tempY;
}

function collide(p) {
return ball.x < p.x + p.w &&
ball.x + ball.r > p.x &&
ball.y < p.y + p.h &&
ball.y + ball.r > p.y;
}

function updateAI(set) {

if (aiFreeze > 0) {
aiFreeze--;
return;
}

let predictedY = predictBallY();
aiTargetY = predictedY;

let aiCenter = ai.y + ai.h / 2;

let missed = Math.random() < set.aiMissChance;

if (missed) {
aiFreeze = set.aiFreeze;
return;
}

if (aiCenter < aiTargetY - 10) ai.y += set.aiSpeed;
if (aiCenter > aiTargetY + 10) ai.y -= set.aiSpeed;

ai.y = Math.max(0, Math.min(canvas.height - ai.h, ai.y));
}

function checkWin() {
if (player.score >= 5 || ai.score >= 5) {
gameOver = true;
document.getElementById("centerText").innerHTML =
(player.score > ai.score ? "Player Wins!" : "AI Wins!") +
"<br>Want to play again? Press SPACE";
}
}

document.addEventListener("keydown", e => {
if (gameOver && e.code === "Space") {
player.score = 0;
ai.score = 0;
gameOver = false;
document.getElementById("centerText").innerHTML = "";
resetPositions();
}
});

canvas.addEventListener("click", e => {
if (gameOver) return;

const rect = canvas.getBoundingClientRect();
const tx = e.clientX - rect.left;
const ty = e.clientY - rect.top;

const set = difficultySettings[difficulty];

let dx = tx - ball.x;
let dy = ty - ball.y;

let len = Math.sqrt(dx * dx + dy * dy);
if (len === 0) len = 1;

ball.vx = (dx / len) * set.ballSpeed * 1.3;
ball.vy = (dy / len) * set.ballSpeed * 1.3;

ball.vx = Math.max(-5, Math.min(5, ball.vx));
ball.vy = Math.max(-4, Math.min(4, ball.vy));
});

function update() {
if (gameOver) return;

const set = difficultySettings[difficulty];

const playerSpeed = set.ballSpeed * 0.7;

if (keys["w"]) player.y -= playerSpeed;
if (keys["s"]) player.y += playerSpeed;

player.y = Math.max(0, Math.min(canvas.height - player.h, player.y));

updateAI(set);

ball.x += ball.vx;
ball.y += ball.vy;

if (ball.y <= 0 || ball.y >= canvas.height - ball.r) {
ball.vy *= -1;
}

if (collide(player)) ball.vx = Math.abs(ball.vx);
if (collide(ai)) ball.vx = -Math.abs(ball.vx);

if (ball.x < 0) {
ai.score++;
resetPositions();
}

if (ball.x > canvas.width) {
player.score++;
resetPositions();
}

checkWin();

document.getElementById("hud").innerText =
`Player ${player.score} - AI ${ai.score}`;
}

function draw() {
ctx.clearRect(0, 0, canvas.width, canvas.height);

ctx.fillStyle = "#333";
for (let y = 0; y < canvas.height; y += 20) {
ctx.fillRect(canvas.width / 2 - 1, y, 2, 10);
}

ctx.fillStyle = "white";
ctx.fillRect(player.x, player.y, player.w, player.h);

ctx.fillStyle = "red";
ctx.fillRect(ai.x, ai.y, ai.w, ai.h);

ctx.fillStyle = "yellow";
ctx.beginPath();
ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
ctx.fill();
}

function loop() {
update();
draw();
requestAnimationFrame(loop);
}

resetPositions();
loop();
</script>

</body>
</html>
