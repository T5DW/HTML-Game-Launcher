<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flappy Circle</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
    font-family: Arial;
}

canvas {
    display: block;
    margin: auto;
    background: #1e1e1e;
}

.score {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 24px;
}

.gameover {
    position: absolute;
    width: 100%;
    top: 40%;
    text-align: center;
    color: white;
    font-size: 28px;
}
</style>
</head>

<body>

<div class="score" id="score">Score: 0</div>
<div class="gameover" id="gameover"></div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 500;
canvas.height = 700;

const player = {
    x: 120,
    y: 300,
    radius: 20,
    velocity: 0,
    gravity: 0.11,
    jump: -3.8
};

let pipes = [];
let score = 0;
let gameOver = false;
let spawnTimer = 0;

function resetGame() {
    player.y = 300;
    player.velocity = 0;
    pipes = [];
    score = 0;
    gameOver = false;
    spawnTimer = 0;

    document.getElementById("score").innerText = "Score: 0";
    document.getElementById("gameover").innerHTML = "";
}

function flap() {
    if (gameOver) return;

    player.velocity = player.jump;
}

document.addEventListener("keydown", e => {
    if (e.code === "Space") {
        if (gameOver) {
            resetGame();
        } else {
            flap();
        }
    }
});

document.addEventListener("mousedown", () => {
    flap();
});

function spawnPipe() {
    const gap = 210;
    const topHeight = Math.random() * 220 + 80;

    pipes.push({
        x: canvas.width,
        width: 80,
        top: topHeight,
        bottom: topHeight + gap,
        passed: false
    });
}

function update() {
    if (gameOver) return;

    spawnTimer++;

    if (spawnTimer >= 120) {
        spawnPipe();
        spawnTimer = 0;
    }

    player.velocity += player.gravity;

    if (player.velocity > 3) {
        player.velocity = 3;
    }

    player.y += player.velocity;

    if (player.y + player.radius >= canvas.height) {
        player.y = canvas.height - player.radius;
        endGame();
    }

    if (player.y - player.radius <= 0) {
        player.y = player.radius;
        player.velocity = 0;
    }

    for (let i = pipes.length - 1; i >= 0; i--) {
        const pipe = pipes[i];

        pipe.x -= 2.4;

        if (
            player.x + player.radius > pipe.x &&
            player.x - player.radius < pipe.x + pipe.width &&
            (
                player.y - player.radius < pipe.top ||
                player.y + player.radius > pipe.bottom
            )
        ) {
            endGame();
        }

        if (!pipe.passed && pipe.x + pipe.width < player.x) {
            pipe.passed = true;
            score++;
            document.getElementById("score").innerText = "Score: " + score;
        }

        if (pipe.x + pipe.width < 0) {
            pipes.splice(i, 1);
        }
    }
}

function endGame() {
    gameOver = true;

    document.getElementById("gameover").innerHTML =
        "Game Over<br>Score: " + score + "<br><br>Press SPACE to Restart";
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#4fc3f7";

    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#44ff44";

    pipes.forEach(pipe => {
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.top);
        ctx.fillRect(pipe.x, pipe.bottom, pipe.width, canvas.height);
    });
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
